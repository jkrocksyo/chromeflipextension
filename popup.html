<!DOCTYPE html>
<html lang="en">
<head>
    <title>Video Transformer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 210px;
            background: #1a1c24;
            color: #dde1ec;
            padding: 14px;
        }

        h3 {
            font-size: 14px;
            font-weight: 700;
            color: #dde1ec;
            text-align: center;
            margin-bottom: 12px;
        }

        button {
            display: block;
            width: 100%;
            background: #252833;
            border: 1px solid #31354a;
            border-radius: 7px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            color: #dde1ec;
            padding: 10px 8px;
            margin-bottom: 7px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, color 0.12s;
        }

        button:hover {
            background: #1db89a18;
            border-color: #1db89a;
            color: #1db89a;
        }

        button:active { opacity: 0.75; }

        #reset-btn:hover {
            background: #c0505018;
            border-color: #c05050;
            color: #c05050;
        }

        .divider {
            height: 1px;
            background: #252833;
            margin: 6px 0 12px;
        }

        #status {
            font-size: 11px;
            color: #5c6280;
            text-align: center;
            margin-top: 4px;
        }

        #status-text {
            color: #1db89a;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h3>Video Transformer</h3>
    <button id="flip-h">Flip Horizontal</button>
    <button id="flip-v">Flip Vertical</button>
    <button id="reset-btn">Reset</button>
    <div class="divider"></div>
    <button id="next-btn">Next Video</button>
    <div id="status">Affecting: <span id="status-text">—</span></div>
    <script src="popup.js"></script>
</body>
</html>
